name: RDP 24/7 with Persistent Storage

on:
  workflow_dispatch:
  schedule:
    # Run every 5 hours to refresh the runner before timeout
    - cron: '0 */5 * * *'

jobs:
  setup-persistent-storage:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.setup.outputs.artifact-name }}
    steps:
      - name: Create artifact storage directory
        id: setup
        run: |
          ARTIFACT_NAME="rdp-persistent-data-$(date +%s)"
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "RDP persistent storage initialized for artifact: $ARTIFACT_NAME"

  secure-rdp:
    needs: setup-persistent-storage
    runs-on: windows-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1

    steps:
      - name: Restore Previous Session Data
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: rdp-persistent-data
          path: C:\rdp-storage

      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication (if needed)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove any existing rule with the same name to avoid duplication
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null

          # For testing, allow any incoming connection on port 3389
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          # Restart the Remote Desktop service to ensure changes take effect
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)      # A-Z
              Lower   = [char[]](97..122)     # a-z
              Number  = [char[]](48..57)      # 0-9
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126)) # Special characters
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Check if user already exists
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Write-Host "RDP user already exists"
          } else {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "RDP"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          }

          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # Bring up Tailscale with the provided auth key and set a unique hostname
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID

          # Wait for Tailscale to assign an IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"

          # Test connectivity using Test-NetConnection against the Tailscale IP on port 3389
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Setup Persistent Storage Directory
        run: |
          # Create persistent storage directory
          New-Item -ItemType Directory -Path "C:\rdp-storage" -Force | Out-Null
          
          # Create important folders
          New-Item -ItemType Directory -Path "C:\rdp-storage\Downloads" -Force | Out-Null
          New-Item -ItemType Directory -Path "C:\rdp-storage\Documents" -Force | Out-Null
          New-Item -ItemType Directory -Path "C:\rdp-storage\Software" -Force | Out-Null
          
          Write-Host "Persistent storage initialized at C:\rdp-storage"

      - name: Display RDP Access Information
        run: |
          Write-Host "`n=========================================="
          Write-Host "RDP SESSION ACTIVE - 6 HOURS"
          Write-Host "=========================================="
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "Persistent Storage: C:\rdp-storage"
          Write-Host "=========================================="
          Write-Host "Note: All files saved to C:\rdp-storage will be preserved`n"
          Write-Host "=========================================="

      - name: Maintain Connection (6 Hours)
        run: |
          $startTime = Get-Date
          $timeout = 355 # 355 minutes (leaving 5 min buffer before 360 min total timeout)
          
          while ($true) {
              $elapsedMinutes = [math]::Round(((Get-Date) - $startTime).TotalMinutes)
              $remainingMinutes = $timeout - $elapsedMinutes
              
              if ($elapsedMinutes -ge $timeout) {
                  Write-Host "[$(Get-Date)] Approaching timeout. Preparing to save data and close..."
                  break
              }
              
              Write-Host "[$(Get-Date)] RDP Active - Session will auto-restart in $remainingMinutes minutes"
              Start-Sleep -Seconds 300
          }

      - name: Save Persistent Data to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rdp-persistent-data
          path: C:\rdp-storage
          retention-days: 90
          overwrite: true

      - name: Create Session Log
        if: always()
        run: |
          $logContent = @"
          ==============================================
          RDP Session Log
          ==============================================
          Run ID: $env:GITHUB_RUN_ID
          Timestamp: $(Get-Date)
          Tailscale IP: $env:TAILSCALE_IP
          Status: Completed - Data Saved
          Next Workflow: Will restore from artifacts
          ==============================================
          "@
          
          Add-Content -Path "C:\rdp-storage\session-log.txt" -Value $logContent

      - name: Trigger Next Workflow Run
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            // Auto-trigger next workflow run after 5 minutes delay
            setTimeout(() => {
              github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'main.yml',
                ref: context.ref
              });
            }, 300000); // 5 minute delay before triggering next run
